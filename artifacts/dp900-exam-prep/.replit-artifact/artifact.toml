kind = "web"
previewPath = "/"
title = "DP-900 Exam Prep"
version = "1.0.0"
id = "artifacts/dp900-exam-prep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21765

[services.development]
run = "pnpm --filter @workspace/dp900-exam-prep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dp900-exam-prep", "run", "build" ]
publicDir = "artifacts/dp900-exam-prep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21765"
BASE_PATH = "/"
